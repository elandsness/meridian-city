# =============================================================================
# Meridian Airport — industry config overlay (Phase 3)
# =============================================================================
# Layer this over the base chart + your secrets to deploy an airport-branded
# instance:
#   ./scripts/deploy.sh install -f helm/values-custom.yaml -f helm/values-airport.yaml
#
# Only the `industry` block is overridden — it re-skins the EXISTING screens
# (name, palette, logo, terminology, screen set, AI persona). Airport-matched demo
# DATA (traffic-bot/seed) and Dynatrace naming/flows are separate follow-on chunks;
# until those land, the backend still emits city-flavoured data.
# -----------------------------------------------------------------------------
industry:
  version: 1
  id: airport
  company:
    name: "Meridian Airport"
    short: "Meridian"
    tagline: "Every journey, on time."
    assistant:
      name: "Skye"
      persona: "the Meridian Airport virtual assistant"
      supportPhone: "1-555-FLY-MERID (1-555-359-6374)"
      systemPrompt: |-
        You are Skye, the official virtual assistant for Meridian Airport — a real,
        busy international airport. Always respond as though Meridian Airport genuinely
        exists and you are its assistant. Never say you are a generic AI model or that
        the airport is fictional, and never break character.

        You help passengers with:
        - Flight status and gate information.
        - Airport services: parking, security wait times, lounges, and baggage claim.
        - Reporting an issue at the airport (spills, broken equipment, lost items) —
          remind them they can file a request in the Meridian Airport app.
        - Checking the status of a submitted request (by request ID, e.g. req-00123).

        If a passenger needs to reach a person, give the Meridian Airport help line:
        1-555-FLY-MERID (1-555-359-6374), available 24/7, or direct them to file a
        request in the app.

        Be concise, warm, and professional. Acknowledge the passenger's concern before
        providing information. If a request ID is mentioned, use the context below to
        give a specific update.
  theme:
    colors:
      brand: "#0B3D91"
      brandDeep: "#072A63"
      brandSoft: "#2563EB"
      brandTint: "#E7EEFB"
      accent: "#06B6D4"
      accentSoft: "#38BDF8"
      accentInk: "#062B36"
    logo: "/meridian-airport-logo.svg"
    favicon: "/meridian-airport-logo.svg"
  terminology:
    customer: "Passenger"
    customerPlural: "Passengers"
    request: "Request"
    requestPlural: "Requests"
    incident: "Operational incident"
    incidentPlural: "Operational incidents"
    workOrder: "Work order"
    asset: "Ground equipment"
    assetPlural: "Ground equipment"
  screens:
    # store + billing intentionally omitted -> disabled for the airport
    public:
      - home
      - { id: my-journey, label: "My Journey" }
      - { id: service-requests, label: "Help & requests" }
      - messages
    ops:
      - overview
      - { id: flight-board, label: "Flight Board" }
      - { id: airfield, label: "Airfield" }
      - { id: requests, label: "Maintenance queue" }
      - { id: iot, label: "Ground equipment" }
      - { id: incidents, label: "Operational incidents" }
      - { id: analytics, label: "On-time performance" }
      - demo-control
  # Home-page modules for the passenger portal: status board, airfield map, journey tracker.
  home:
    public:
      - flight-status
      - airfield-map
      - my-journey
      - quick-actions
    ops:
      - flight-summary
      - ops-overview
  # Backend-only demo data + dispatch routing (delivered to traffic-bot +
  # service-dispatch via env; never sent to the browser config.json).
  data:
    zones:
      - terminal-1
      - terminal-2
      - concourse-a
      - concourse-b
      - airfield
      - baggage-hall
      - curbside
    requestTemplates:
      - { category: terminal,         title: "Jet bridge stuck at gate B12",       description: "The passenger boarding bridge at gate B12 is stuck and won't align with the aircraft door." }
      - { category: terminal,         title: "Boarding display frozen at B7",      description: "The flight information display at gate B7 is frozen on a departed flight." }
      - { category: terminal,         title: "Escalator down in Terminal 2",       description: "The escalator to the Terminal 2 mezzanine has stopped and is cordoned off." }
      - { category: baggage,          title: "Baggage carousel 4 jammed",          description: "Carousel 4 in the baggage hall has jammed with bags backing up on the belt." }
      - { category: baggage,          title: "Oversize bag scanner offline",       description: "The oversize baggage scanner near check-in row H is offline." }
      - { category: airfield,         title: "FOD debris on Taxiway C",            description: "Foreign object debris reported on Taxiway C near the intersection with Taxiway B." }
      - { category: airfield,         title: "Ground power unit fault at stand A3", description: "The fixed ground power unit at stand A3 keeps tripping its breaker." }
      - { category: airfield,         title: "Apron floodlight out at stand C9",   description: "An apron floodlight over stand C9 is out, reducing night ramp visibility." }
      - { category: security,         title: "Security lane 3 scanner error",      description: "The X-ray scanner at security lane 3 is throwing repeated faults." }
      - { category: security,         title: "Long queue at Terminal 1 security",  description: "Passenger wait times at the Terminal 1 checkpoint are exceeding 30 minutes." }
      - { category: facilities,       title: "Restroom flooding near gate A10",    description: "Water is pooling on the floor of the restroom near gate A10." }
      - { category: facilities,       title: "Concourse B HVAC too warm",          description: "The air conditioning in Concourse B is not keeping up; passengers reporting heat." }
      - { category: ground-transport, title: "Parking gate arm broken in P3",      description: "The exit gate arm in parking structure P3 is stuck down, blocking cars." }
      - { category: ground-transport, title: "Shuttle bay 2 blocked",             description: "A stalled vehicle is blocking shuttle bay 2 at the arrivals curb." }
    chatQuestions:
      - "How long is the security wait at Terminal 1?"
      - "Where is the nearest lounge?"
      - "Which gate does my flight leave from?"
      - "Where do I report lost or delayed baggage?"
      - "Where is short-term parking and how much does it cost?"
      - "How early should I arrive for an international flight?"
      - "How do I get between Terminal 1 and Terminal 2?"
      - "Where can I find wheelchair assistance?"
      - "Are there charging stations after security?"
      - "Where is the pet relief area?"
      - "Where do I pick up my rental car?"
      - "Is there a shuttle to long-term parking?"
  routing:
    terminal: "Terminal Operations"
    baggage: "Baggage Handling"
    airfield: "Airfield Operations"
    security: "Security & Screening"
    facilities: "Facilities Management"
    ground-transport: "Ground Transportation"
  # Dynatrace reskin (Path A): rename the service map (OneAgent services; each rule scoped
  # to this instance's namespace) and the Business Flow titles. OTel services (ai-service,
  # iot-*) are renamed via OTEL_SERVICE_NAME separately, not here.
  dynatrace:
    serviceNames:
      citizen-service: "Passenger Services"
      service-dispatch: "Operations Dispatch"
      city-operations: "Airfield Operations"
      api-gateway: "Airport API Gateway"
      notification-service: "Passenger Notifications"
      commerce-service: "Airport Retail"
      billing-service: "Airport Fees"
      demo-control-api: "Demo Control"
    flowLabels:
      service-request: "Maintenance Request Lifecycle"
      account-creation: "Passenger Registration"
      iot-incident: "Ground Equipment Incident Resolution"
      purchase: "Airport Retail Purchase"
      tax-payment: "Airport Fee Payment"
    # Active Business Flows for the airport: drop the city store/tax funnels and add the
    # two aviation hero flows (both defined in provision-dynatrace-business-config.py).
    flows:
      - service-request
      - account-creation
      - iot-incident
      - aircraft-turnaround
      - passenger-journey
