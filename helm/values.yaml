# =============================================================================
# Meridian City Platform — Helm Values
# =============================================================================
# Copy this file to values-custom.yaml and fill in the required values.
# Required fields are marked with: # REQUIRED
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
# Registry prefix for meridian-city application images only.
# Kept outside of `global` so Bitnami/OTel sub-charts never inherit it
# (Helm propagates every key under `global` to sub-charts automatically).
# All service images are resolved as: <appImageRegistry>/<service-name>:<imageTag>
appImageRegistry: "ghcr.io/your-org/meridian-city-platform"

global:
  imageTag: "latest"
  namespace: "meridian"
  # Always pull so that a fresh CI build of the floating ":latest" tag is
  # actually fetched on each (re)deploy.  With IfNotPresent, a kind node that
  # already cached ":latest" will keep serving the stale image after CI
  # rebuilds it — pods silently run old code until the cached layer is purged.
  # If you pin imageTag to an immutable tag (e.g. a git SHA), IfNotPresent is
  # safe and faster; revert this then.
  imagePullPolicy: Always
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# Dynatrace configuration
# ---------------------------------------------------------------------------
dynatrace:
  # REQUIRED: Dynatrace SaaS tenant API URL
  # Format: https://<environment-id>.live.dynatrace.com/api
  apiUrl: ""

  # REQUIRED: Dynatrace API token
  # Required scopes: metrics.ingest, logs.ingest, openTelemetryTrace.ingest,
  #                  entities.read, settings.write, DataExport
  apiToken: ""

  # REQUIRED: OTLP ingest endpoint for OpenTelemetry data
  # Format: https://<environment-id>.live.dynatrace.com/api/v2/otlp
  otlpEndpoint: ""

  # Dynatrace environment ID (the subdomain part of your tenant URL)
  # e.g., abc12345 from https://abc12345.live.dynatrace.com
  environmentId: ""

  # Deployment environment label (visible in Dynatrace entity properties)
  deploymentEnvironment: "demo"

  # Kubernetes cluster name (visible in Dynatrace k8s monitoring)
  clusterName: "meridian-cluster"

  # Whether to deploy the Dynatrace Operator for OneAgent auto-instrumentation.
  # When enabled, the operator and a DynaKube CR are created in the 'dynatrace' namespace.
  operator:
    enabled: true

  # Dynatrace Kubernetes Log Module — captures container stdout into Grail Logs
  # (this is what gets the business-event JSON logs in under applicationMonitoring).
  # Operator-managed DaemonSet, no privileged/hostPath, so it works on GKE Autopilot.
  # The tag MUST be pinned (no 'latest') and should track the OneAgent codeModules
  # version (check: kubectl -n dynatrace get dynakube <name> -o jsonpath
  # '{.status.codeModules.version}'). Tags: https://gallery.ecr.aws/dynatrace/dynatrace-logmodule
  logMonitoring:
    enabled: true
    image:
      repository: "public.ecr.aws/dynatrace/dynatrace-logmodule"
      tag: "1.339.55.20260615-110349"

# ---------------------------------------------------------------------------
# LLM / AI configuration (for the citizen chatbot and ai-service)
# ---------------------------------------------------------------------------
llm:
  # Provider selection: openai | anthropic | local
  provider: "openai"

  openai:
    # REQUIRED if provider=openai
    apiKey: ""
    model: "gpt-4o"
    baseUrl: "https://api.openai.com/v1"

  anthropic:
    # REQUIRED if provider=anthropic
    apiKey: ""
    model: "claude-sonnet-4-6"

  local:
    # Used when provider=local; assumes Ollama running in-cluster
    endpoint: "http://ollama:11434"
    model: "llama3"

# ---------------------------------------------------------------------------
# Mock authentication (ops dashboard login)
# Credentials are hardcoded — this is intentional (it's a demo).
# The auth flow exists to generate login traces in Dynatrace, not for security.
# ---------------------------------------------------------------------------
auth:
  username: "demo"
  password: "dynatrace"

# ---------------------------------------------------------------------------
# API Gateway (Node.js / Fastify)
# Single entry point for all frontend traffic.
# ---------------------------------------------------------------------------
apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: "api-gateway"
    tag: ""
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: "api.meridian.local"
    tls: []
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# ---------------------------------------------------------------------------
# Citizen Service (Java / Spring Boot)
# Manages citizen accounts and service request submission.
# ---------------------------------------------------------------------------
citizenService:
  enabled: true
  replicaCount: 1
  image:
    repository: "citizen-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env: {}

# ---------------------------------------------------------------------------
# Commerce Service (Java / Spring Boot)
# City store: products, cart, one-click checkout, and the simulated order
# lifecycle (placed -> packed -> shipped -> delivered). Emits commerce.events.
# ---------------------------------------------------------------------------
commerceService:
  enabled: true
  replicaCount: 1
  image:
    repository: "commerce-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8090
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Billing Service (Java / Spring Boot)
# Tax bills: quarterly history generated at registration (consumes citizens.events),
# pay a bill (simulated). Emits billing.events.
# ---------------------------------------------------------------------------
billingService:
  enabled: true
  replicaCount: 1
  image:
    repository: "billing-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8091
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Service Dispatch (Java / Spring Boot)
# Routes and assigns service requests; emits Business Events at each step.
# ---------------------------------------------------------------------------
serviceDispatch:
  enabled: true
  replicaCount: 1
  image:
    repository: "service-dispatch"
    tag: ""
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env: {}

# ---------------------------------------------------------------------------
# City Operations (Java / Spring Boot)
# City asset registry, work orders, and incident management.
# ---------------------------------------------------------------------------
cityOperations:
  enabled: true
  replicaCount: 1
  image:
    repository: "city-operations"
    tag: ""
  service:
    type: ClusterIP
    port: 8083
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  # Fault injection flags — set by demo-control-api at runtime
  faultInjection:
    dbSlowdownEnabled: false
    dbSlowdownDelayMs: 0
    cpuSpikeEnabled: false
  env: {}

# ---------------------------------------------------------------------------
# Analytics Service (Python / FastAPI)
# KPI aggregation, SRG metric endpoint, and Business Analytics support.
# ---------------------------------------------------------------------------
analyticsService:
  enabled: true
  replicaCount: 1
  image:
    repository: "analytics-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8084
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# ---------------------------------------------------------------------------
# AI Service (Python / FastAPI + OTel SDK)
# Citizen chatbot with swappable LLM backend.
# Uses OTel GenAI semantic conventions for Dynatrace AI Observability.
# ---------------------------------------------------------------------------
aiService:
  enabled: true
  replicaCount: 1
  image:
    repository: "ai-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8085
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  # Fault injection: simulated LLM latency (seconds)
  faultInjection:
    llmLatencyEnabled: false
    llmLatencySeconds: 0
  env: {}

# ---------------------------------------------------------------------------
# IoT Ingestion (Go + OTel SDK)
# Receives OTLP/gRPC telemetry from IoT simulators; publishes to Kafka.
# ---------------------------------------------------------------------------
iotIngestion:
  enabled: true
  replicaCount: 1
  image:
    repository: "iot-ingestion"
    tag: ""
  service:
    type: ClusterIP
    grpcPort: 4317
    httpPort: 4318
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# ---------------------------------------------------------------------------
# Telemetry Processor (Python / FastAPI + OTel SDK)
# Kafka consumer: processes IoT telemetry, detects anomalies, stores in PostgreSQL.
# ---------------------------------------------------------------------------
telemetryProcessor:
  enabled: true
  replicaCount: 1
  image:
    repository: "telemetry-processor"
    tag: ""
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  # Fault injection: pause Kafka consumption to simulate consumer lag
  faultInjection:
    kafkaPauseEnabled: false
    memoryPressureEnabled: false
  env: {}

# ---------------------------------------------------------------------------
# Notification Service (Node.js / Express)
# Kafka consumer; delivers in-app notifications for incidents and work orders.
# ---------------------------------------------------------------------------
notificationService:
  enabled: true
  replicaCount: 1
  image:
    repository: "notification-service"
    tag: ""
  service:
    type: ClusterIP
    port: 8087
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# ---------------------------------------------------------------------------
# Demo Control API (Node.js / Fastify)
# REST API backing the ops dashboard demo control panel.
# Manages fault injection, fleet sizing, and scenario triggers.
# ---------------------------------------------------------------------------
demoControlApi:
  enabled: true
  replicaCount: 1
  image:
    repository: "demo-control-api"
    tag: ""
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# ---------------------------------------------------------------------------
# IoT Simulator (Go + OTel SDK)
# Simulates a dynamic fleet of IoT devices emitting OTLP telemetry.
# Fleet size and anomalies are configurable at runtime via demo-control-api.
# ---------------------------------------------------------------------------
iotSimulator:
  enabled: true
  image:
    repository: "iot-simulator"
    tag: ""
  fleet:
    vehicles:
      count: 30
      # Interval between telemetry emissions per device
      emitIntervalSeconds: 15
      # Baseline probability that any given device emits an anomalous reading
      anomalyProbability: 0.01
    buildings:
      count: 15
      emitIntervalSeconds: 15
      anomalyProbability: 0.01
    machines:
      count: 10
      emitIntervalSeconds: 15
      anomalyProbability: 0.01
  # Target for OTLP telemetry (the iot-ingestion service)
  otlpEndpoint: "http://iot-ingestion:4317"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Traffic Bot (Node.js)
# Continuously simulates citizen user journeys against the public portal.
# Drives realistic distributed traces through the full service stack.
# ---------------------------------------------------------------------------
trafficBot:
  enabled: true
  image:
    repository: "traffic-bot"
    tag: ""
  config:
    # Average HTTP requests per minute sent to the API gateway. Kept low so only a
    # handful of flows are in-flight at once; server-side schedulers complete them.
    requestsPerMinute: 8
    # Target URL for the API gateway
    targetUrl: "http://api-gateway:3000"
    # Which journey types to simulate
    scenarios:
      citizenRequests: true
      accountCreation: true
      browsing: true
      storePurchase: true
      payTax: true
      chatbot: false  # disable by default to avoid LLM API cost in steady-state
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ---------------------------------------------------------------------------
# Public Portal (React / Vite)
# Citizen-facing city portal: service requests, city map, AI chatbot.
# ---------------------------------------------------------------------------
publicPortal:
  enabled: true
  replicaCount: 1
  image:
    repository: "public-portal"
    tag: ""
  # Dynatrace RUM (agentless). The application id / agent URL is shipped to every
  # browser and is NOT a secret. Paste the full <script ...></script> tag from
  # Dynatrace (Application > Setup > Manual insertion) on a single line, no single
  # quotes (it is injected into nginx sub_filter). Enabling rolls the pod.
  rum:
    enabled: false
    snippet: ""
  service:
    # LoadBalancer gives the SPA a stable external endpoint; its nginx also proxies
    # /api → api-gateway, so one origin serves both UI and API. On clusters without a
    # LoadBalancer controller (e.g. kind) the external IP stays <pending> and you fall
    # back to `kubectl port-forward` — but note port-forward drops the SPA's burst of
    # concurrent /api XHRs (browser sees status 0), so prefer the LB where available.
    type: LoadBalancer
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: "city.meridian.local"
    tls: []
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# Ops Dashboard (React / Vite)
# Internal operations view + Demo Control Panel.
# Requires mock authentication (see auth.username / auth.password above).
# ---------------------------------------------------------------------------
opsDashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: "ops-dashboard"
    tag: ""
  # Dynatrace RUM (agentless) — see publicPortal.rum above. Register a separate
  # Dynatrace web application for the ops dashboard and paste its snippet here.
  rum:
    enabled: false
    snippet: ""
  service:
    # LoadBalancer for a stable external endpoint (see publicPortal.service note).
    type: LoadBalancer
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: "ops.meridian.local"
    tls: []
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# Infrastructure: PostgreSQL (CloudNativePG operator)
# Images: ghcr.io/cloudnative-pg/* — public, no auth required.
# The operator creates a single-instance Postgres cluster named meridian-db.
# Services: meridian-db-rw (read-write), meridian-db-r (read-only)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: "meridian"
    # REQUIRED: change this before deploying
    password: "meridian-secret-change-me"
    database: "meridian"
  storage:
    size: "10Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# CloudNativePG operator sub-chart values
cloudnative-pg:
  crds:
    create: true

# ---------------------------------------------------------------------------
# Infrastructure: Kafka (Strimzi operator)
# Images: quay.io/strimzi/* — public, no auth required.
# Runs a single-node KRaft cluster named meridian. Topics managed via
# KafkaTopic CRDs. Bootstrap: meridian-kafka-bootstrap:9092
# ---------------------------------------------------------------------------
kafka:
  enabled: true
  # Kafka broker version — MUST be supported by the installed Strimzi operator.
  # If this version is wrong, the Kafka CR will go NotReady with an
  # UnsupportedKafkaVersionException and no broker pod will be created.
  # Check supported versions: kubectl describe kafka meridian -n meridian | grep -A3 Conditions
  # Strimzi chart >=1.0.0 supports: 4.1.0, 4.1.1, 4.1.2, 4.2.0
  version: "4.2.0"
  storage:
    size: "8Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  topics:
    - name: iot.telemetry.raw
      partitions: 3
      replicationFactor: 1
      config:
        retention.ms: "86400000"
    - name: iot.anomalies
      partitions: 1
      replicationFactor: 1
      config:
        retention.ms: "86400000"
    - name: requests.events
      partitions: 2
      replicationFactor: 1
      config:
        retention.ms: "604800000"
    - name: notifications.outbound
      partitions: 1
      replicationFactor: 1
      config:
        retention.ms: "3600000"
    - name: commerce.events
      partitions: 2
      replicationFactor: 1
      config:
        retention.ms: "604800000"
    - name: citizens.events
      partitions: 2
      replicationFactor: 1
      config:
        retention.ms: "604800000"
    - name: billing.events
      partitions: 1
      replicationFactor: 1
      config:
        retention.ms: "604800000"

# Strimzi operator sub-chart values
strimzi-kafka-operator:
  watchAnyNamespace: false

# ---------------------------------------------------------------------------
# Infrastructure: OpenTelemetry Collector (OTEL Helm chart dependency)
# The collector config is injected via the otel-collector-config ConfigMap
# defined in helm/templates/otel-configmap.yaml.
# ---------------------------------------------------------------------------
opentelemetry-collector:
  enabled: true
  mode: deployment
  replicaCount: 1
  image:
    repository: "otel/opentelemetry-collector-contrib"
  # Override config via external ConfigMap (see helm/templates/otel-configmap.yaml)
  configMap:
    create: false
    existingName: "otel-collector-config"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Infrastructure: Meridian log collector (DaemonSet) — OPT-IN FALLBACK, default OFF
# Tails the meridian namespace's container stdout off each node via a hostPath
# mount and ships it to Dynatrace over OTLP/HTTP. It was the original way to get
# business-event logs into Grail under applicationMonitoring (no host OneAgent).
#
# PREFER the Dynatrace Kubernetes Log Module instead (spec.logMonitoring in the
# DynaKube — see helm/templates/dynakube.yaml): it captures stdout natively, needs
# no hostPath/root, and works on GKE Autopilot — which this DaemonSet does NOT
# (Autopilot blocks hostPath volumes and root containers). Keep this disabled when
# the Log Module is enabled, or logs get ingested twice. Only enable on a
# hostPath-capable cluster (e.g. plain kind) that isn't running the Log Module.
# ---------------------------------------------------------------------------
logCollector:
  enabled: false
  image: "otel/opentelemetry-collector-contrib:0.114.0"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# Infrastructure: Dynatrace Operator
# The operator is installed as its OWN Helm release in the 'dynatrace'
# namespace by scripts/deploy.sh (NOT as a sub-chart — a sub-chart would land
# in the meridian release namespace and never reconcile the DynaKube, which
# lives in 'dynatrace'). It is installed only when Dynatrace is configured,
# i.e. when the DynaKube renders (dynatrace.operator.enabled && dynatrace.apiUrl).
# The DynaKube CR + token secret are created by this chart in the 'dynatrace'
# namespace (helm/templates/dynakube.yaml, helm/templates/app-secrets.yaml).
# ---------------------------------------------------------------------------
