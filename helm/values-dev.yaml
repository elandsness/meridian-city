# =============================================================================
# Meridian City Platform — Development / Local Overrides
# =============================================================================
# Apply on top of values.yaml for local development (kind / Docker Desktop):
#   ./scripts/deploy.sh install -f helm/values-dev.yaml -f helm/values-custom.yaml
# deploy.sh generates a per-instance hash (release/namespace meridian-<hash>) and
# installs the shared operators once. For a fixed local name, pin INSTANCE_HASH=dev.
# (A bare `helm install meridian ./helm ...` still works as a single legacy instance.)
# =============================================================================

global:
  imagePullPolicy: Always

# Smaller fleet for faster startup in local k8s
iotSimulator:
  fleet:
    vehicles:
      count: 5
      emitIntervalSeconds: 30
    buildings:
      count: 3
      emitIntervalSeconds: 30
    machines:
      count: 2
      emitIntervalSeconds: 30

# Reduced traffic for local dev
trafficBot:
  config:
    requestsPerMinute: 10
    scenarios:
      # On for local dev too: local typically targets in-cluster Ollama (no API
      # cost), and it lets the llm-latency scenario be tested end-to-end locally.
      chatbot: true

# Smaller resource footprints for local clusters
postgresql:
  primary:
    persistence:
      size: "2Gi"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

kafka:
  replicaCount: 1
  persistence:
    size: "2Gi"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Expose via NodePort for easy local access
apiGateway:
  service:
    type: NodePort
    nodePort: 30080

publicPortal:
  service:
    type: NodePort
    nodePort: 30081

opsDashboard:
  service:
    type: NodePort
    nodePort: 30082

# Disable the Dynatrace Operator in dev (optional — comment out if you have a DT
# tenant). deploy.sh skips the operator install when this is false / apiUrl unset.
dynatrace:
  operator:
    enabled: false
