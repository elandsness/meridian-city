apiVersion: v2
name: meridian-city-platform
description: >
  Meridian City Platform — a fictional smart city operations application for demonstrating
  Dynatrace full-stack observability across a polyglot microservices architecture.
type: application
version: 0.1.0
appVersion: "0.1.0"

maintainers:
  - name: Meridian Demo Team
    email: demo@meridian.local

keywords:
  - dynatrace
  - demo
  - observability
  - smart-city
  - iot
  - opentelemetry

# External chart dependencies for infrastructure components.
# Run `helm dependency update ./helm` before first install.
# Pin to specific versions for reproducibility; update deliberately.
dependencies:
  - name: cloudnative-pg
    version: ">=0.20.0 <2.0.0"
    repository: https://cloudnative-pg.github.io/charts
    condition: postgresql.enabled
    alias: cloudnative-pg

  - name: strimzi-kafka-operator
    version: ">=0.40.0 <2.0.0"
    repository: https://strimzi.io/charts/
    condition: kafka.enabled
    alias: strimzi-kafka-operator

  - name: opentelemetry-collector
    version: ">=0.100.0 <1.0.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: opentelemetry-collector.enabled
    alias: opentelemetry-collector

  # NOTE: the Dynatrace Operator is intentionally NOT a sub-chart. A Helm
  # sub-chart always deploys into the parent release namespace (meridian), but
  # the operator must live in the same namespace as the DynaKube it reconciles
  # (dynatrace). scripts/deploy.sh therefore installs it as its own release in
  # the 'dynatrace' namespace when Dynatrace is configured.
