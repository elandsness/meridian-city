apiVersion: v2
name: meridian-city-platform
description: >
  Meridian City Platform — a fictional smart city operations application for demonstrating
  Dynatrace full-stack observability across a polyglot microservices architecture.
type: application
version: 0.1.0
appVersion: "0.1.0"

maintainers:
  - name: Meridian Demo Team
    email: demo@meridian.local

keywords:
  - dynatrace
  - demo
  - observability
  - smart-city
  - iot
  - opentelemetry

# External chart dependencies.
# Run `helm dependency update ./helm` before first install.
# Pin to specific versions for reproducibility; update deliberately.
#
# Only the OpenTelemetry Collector is a sub-chart — it is a per-INSTANCE,
# namespaced workload, so each Meridian install gets its own collector.
dependencies:
  - name: opentelemetry-collector
    version: ">=0.100.0 <1.0.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: opentelemetry-collector.enabled
    alias: opentelemetry-collector

  # MULTI-TENANCY: the cluster-singleton operators are intentionally NOT sub-charts.
  # CloudNativePG and Strimzi each install CLUSTER-SCOPED resources (CRDs, webhooks,
  # ClusterRoles); installing them per-release would collide the moment a second
  # instance is deployed. They (and the Dynatrace Operator, which must live beside
  # its DynaKube in the 'dynatrace' namespace) are therefore installed ONCE as their
  # own shared releases by scripts/deploy.sh (ensure_shared_operators), and each
  # per-instance Meridian release only creates the namespaced CRs the operators
  # reconcile (Cluster, Kafka/KafkaTopic, DynaKube). Strimzi is installed with
  # watchAnyNamespace=true so the single operator reconciles every instance's Kafka.
