{{- if or .Values.postgresql.enabled .Values.kafka.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: meridian-wait-for-operators
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meridian-wait-for-operators
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meridian-wait-for-operators
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: meridian-wait-for-operators
subjects:
  - kind: ServiceAccount
    name: meridian-wait-for-operators
    namespace: {{ include "meridian.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: meridian-wait-for-operators
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: meridian-wait-for-operators
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: rancher/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              {{- if .Values.postgresql.enabled }}
              echo "Waiting for CNPG operator to be ready..."
              kubectl rollout status deployment/meridian-cloudnative-pg \
                -n {{ include "meridian.namespace" . }} --timeout=300s
              {{- end }}
              {{- if .Values.kafka.enabled }}
              echo "Waiting for Strimzi operator to be ready..."
              kubectl rollout status deployment/strimzi-cluster-operator \
                -n {{ include "meridian.namespace" . }} --timeout=300s
              {{- end }}
              echo "All operators ready."
{{- end }}
