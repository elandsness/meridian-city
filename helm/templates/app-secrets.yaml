apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meridian.dbCredentialsSecret" . }}
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresql.auth.username | quote }}
  password: {{ .Values.postgresql.auth.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meridian.appSecret" . }}
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.auth.password | quote }}
  auth-password: {{ .Values.auth.password | quote }}
  llm-openai-api-key: {{ .Values.llm.openai.apiKey | quote }}
  llm-anthropic-api-key: {{ .Values.llm.anthropic.apiKey | quote }}
{{- with .Values.dockerhub }}
{{- if and .username .token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-pull-secret
  namespace: {{ include "meridian.namespace" $ }}
  labels:
    {{- include "meridian.labels" $ | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  {{- $auth := printf "%s:%s" .username .token | b64enc }}
  {{- $dockerconfig := dict "auths" (dict "https://index.docker.io/v1/" (dict "username" .username "password" .token "auth" $auth)) }}
  .dockerconfigjson: {{ $dockerconfig | toJson | b64enc }}
{{- end }}
{{- end }}
---
{{- if .Values.dynatrace.operator.enabled }}
# Consumed by the DynaKube CR — must live in the (shared) dynatrace namespace.
# Per-instance name so concurrent instances don't clobber each other's token.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meridian.dynatraceTokensSecret" . }}
  namespace: dynatrace
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiToken: {{ .Values.dynatrace.apiToken | quote }}
{{- end }}
