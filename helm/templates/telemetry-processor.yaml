{{- if .Values.telemetryProcessor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-processor
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry-processor
spec:
  replicas: {{ .Values.telemetryProcessor.replicaCount }}
  selector:
    matchLabels:
      app: telemetry-processor
  template:
    metadata:
      labels:
        app: telemetry-processor
        {{- include "meridian.labels" . | nindent 8 }}
        app.kubernetes.io/component: telemetry-processor
    spec:
      containers:
        - name: telemetry-processor
          image: {{ include "meridian.image" (dict "repository" .Values.telemetryProcessor.image.repository "tag" .Values.telemetryProcessor.image.tag "context" $) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: OTEL_SERVICE_NAME
              value: "telemetry-processor"
            # Exclude the k8s liveness/readiness probes from FastAPI server spans
            - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
              value: "^/health"
            - name: IOT_SIMULATOR_URL
              value: "http://iot-simulator:8088"
            # Fault injection
            - name: FAULT_MEMORY_PRESSURE_ENABLED
              value: {{ .Values.telemetryProcessor.faultInjection.memoryPressureEnabled | quote }}
            {{- include "meridian.commonEnv" (dict "context" $) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.telemetryProcessor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-processor
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry-processor
spec:
  type: ClusterIP
  selector:
    app: telemetry-processor
  ports:
    - name: http
      port: 8086
      targetPort: 8086
{{- end }}
