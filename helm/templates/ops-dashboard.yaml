{{- if .Values.opsDashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-dashboard
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: ops-dashboard
spec:
  replicas: {{ .Values.opsDashboard.replicaCount }}
  selector:
    matchLabels:
      app: ops-dashboard
  template:
    metadata:
      labels:
        app: ops-dashboard
        {{- include "meridian.labels" . | nindent 8 }}
        app.kubernetes.io/component: ops-dashboard
    spec:
      containers:
        - name: ops-dashboard
          image: {{ include "meridian.image" (dict "repository" .Values.opsDashboard.image.repository "tag" .Values.opsDashboard.image.tag "context" $) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://api-gateway:3000"
            - name: VITE_DEMO_CONTROL_URL
              value: "http://demo-control-api:3001"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.opsDashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ops-dashboard
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: ops-dashboard
spec:
  type: {{ .Values.opsDashboard.service.type }}
  selector:
    app: ops-dashboard
  ports:
    - name: http
      port: {{ .Values.opsDashboard.service.port }}
      targetPort: 80
      {{- if eq .Values.opsDashboard.service.type "NodePort" }}
      {{- if .Values.opsDashboard.service.nodePort }}
      nodePort: {{ .Values.opsDashboard.service.nodePort }}
      {{- end }}
      {{- end }}
---
{{- if .Values.opsDashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ops-dashboard
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.opsDashboard.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.opsDashboard.ingress.className }}
  ingressClassName: {{ .Values.opsDashboard.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.opsDashboard.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ops-dashboard
                port:
                  number: {{ .Values.opsDashboard.service.port }}
{{- end }}
{{- end }}
