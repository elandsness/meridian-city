{{- if .Values.serviceDispatch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-dispatch
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-dispatch
spec:
  replicas: {{ .Values.serviceDispatch.replicaCount }}
  selector:
    matchLabels:
      app: service-dispatch
  template:
    metadata:
      labels:
        app: service-dispatch
        {{- include "meridian.labels" . | nindent 8 }}
        app.kubernetes.io/component: service-dispatch
    spec:
      initContainers:
        {{- include "meridian.kafkaWaitInitContainer" . | nindent 8 }}
      containers:
        - name: service-dispatch
          image: {{ include "meridian.image" (dict "repository" .Values.serviceDispatch.image.repository "tag" .Values.serviceDispatch.image.tag "context" $) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: OTEL_SERVICE_NAME
              value: "service-dispatch"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ include "meridian.dbRwService" . }}:5432/{{ .Values.postgresql.auth.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "meridian.appSecret" . }}
                  key: db-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "meridian.kafkaBootstrap" . }}:9092"
            - name: CITY_OPERATIONS_URL
              value: "http://city-operations:8083"
            # Bridge for images built before the DispatchLog V2 Flyway migration
            # was merged to main and baked into the GHCR image.  Without this,
            # Hibernate ddl-auto=validate fails on startup because requests.dispatch_log
            # doesn't exist yet (V2 is in the branch but the image predates it).
            # seed-data.sh creates the table on deploy.  Remove once the fix branch
            # is merged and CI has published new images.
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "none"
            {{- include "meridian.commonEnv" (dict "context" $) | nindent 12 }}
            {{- with .Values.serviceDispatch.env }}
            {{- include "meridian.extraEnv" . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.serviceDispatch.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: service-dispatch
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-dispatch
spec:
  type: ClusterIP
  selector:
    app: service-dispatch
  ports:
    - name: http
      port: {{ .Values.serviceDispatch.service.port }}
      targetPort: 8082
{{- end }}
