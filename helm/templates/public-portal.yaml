{{- if .Values.publicPortal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-portal
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-portal
spec:
  replicas: {{ .Values.publicPortal.replicaCount }}
  selector:
    matchLabels:
      app: public-portal
  template:
    metadata:
      labels:
        app: public-portal
        {{- include "meridian.labels" . | nindent 8 }}
        app.kubernetes.io/component: public-portal
    spec:
      containers:
        - name: public-portal
          image: {{ include "meridian.image" (dict "repository" .Values.publicPortal.image.repository "tag" .Values.publicPortal.image.tag "context" $) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
          # No API URL env is needed: the app calls relative /api/... paths and
          # nginx (see frontends/public-portal/nginx.conf) proxies them to the
          # api-gateway service inside the cluster. Vite env vars are build-time
          # only and cannot be injected at runtime here.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.publicPortal.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: public-portal
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-portal
spec:
  type: {{ .Values.publicPortal.service.type }}
  selector:
    app: public-portal
  ports:
    - name: http
      port: {{ .Values.publicPortal.service.port }}
      targetPort: 80
      {{- if eq .Values.publicPortal.service.type "NodePort" }}
      {{- if .Values.publicPortal.service.nodePort }}
      nodePort: {{ .Values.publicPortal.service.nodePort }}
      {{- end }}
      {{- end }}
---
{{- if .Values.publicPortal.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-portal
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.publicPortal.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.publicPortal.ingress.className }}
  ingressClassName: {{ .Values.publicPortal.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.publicPortal.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-portal
                port:
                  number: {{ .Values.publicPortal.service.port }}
{{- end }}
{{- end }}
