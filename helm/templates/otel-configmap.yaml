{{- if index .Values "opentelemetry-collector" "enabled" }}
# OTel Collector configuration ConfigMap.
# The opentelemetry-collector chart is configured to use this existing ConfigMap
# via configMap.existingName in values.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
data:
  relay: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      # Receives OTLP from:
      #  - iot-simulator (Go): IoT device telemetry
      #  - iot-ingestion (Go): forwarded device spans
      #  - ai-service (Python): GenAI spans with token metadata
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
            cors:
              allowed_origins: ["*"]

    processors:
      # Prevent OOM by limiting collector memory
      memory_limiter:
        check_interval: 1s
        limit_mib: 800
        spike_limit_mib: 200

      # Batch before exporting to reduce API calls
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # Enrich every resource with deployment metadata
      # Per-instance identity: these attributes are what distinguish this instance's
      # collector-routed telemetry (Go iot-*, Python ai/analytics) from another
      # concurrent Meridian instance's on the shared tenant. (There is no
      # k8sattributes processor here, so service.namespace is the grouping key.)
      resource:
        attributes:
          - key: deployment.environment
            value: "{{ include "meridian.dynatrace.deploymentEnvironment" . }}"
            action: upsert
          - key: k8s.cluster.name
            value: "{{ include "meridian.dynatrace.clusterName" . }}"
            action: upsert
          - key: service.namespace
            value: "{{ include "meridian.namespace" . }}"
            action: upsert

    exporters:
      # Export to Dynatrace via OTLP/HTTP
      otlp_http/dynatrace:
        endpoint: "{{ .Values.dynatrace.otlpEndpoint }}"
        headers:
          Authorization: "Api-Token {{ .Values.dynatrace.apiToken }}"
        compression: gzip
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Debug exporter (disabled in production — enable for troubleshooting)
      # debug:
      #   verbosity: detailed

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp_http/dynatrace]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp_http/dynatrace]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp_http/dynatrace]

      telemetry:
        logs:
          level: "info"
{{- end }}
