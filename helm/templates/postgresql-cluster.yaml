{{- if .Values.postgresql.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "meridian.dbCluster" . }}
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-failed
spec:
  instances: 1
  # CNPG auto-creates a minAvailable:1 PDB for the primary; on a single-instance
  # cluster that allows 0 evictions and blocks GKE node drains during maintenance.
  # Disabling lets the pod be evicted/rescheduled in maintenance windows.
  enablePDB: {{ .Values.postgresql.enablePDB }}
  bootstrap:
    initdb:
      database: {{ .Values.postgresql.auth.database }}
      owner: {{ .Values.postgresql.auth.username }}
      secret:
        name: {{ include "meridian.dbCredentialsSecret" . }}
  storage:
    size: {{ .Values.postgresql.storage.size }}
  resources:
    {{- toYaml .Values.postgresql.resources | nindent 4 }}
{{- end }}
