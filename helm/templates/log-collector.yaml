{{- if and .Values.logCollector.enabled .Values.dynatrace.otlpEndpoint }}
# ---------------------------------------------------------------------------
# Meridian log collector (DaemonSet)
#
# WHY: the DynaKube runs OneAgent in applicationMonitoring mode (no host
# OneAgent DaemonSet — it crash-loops on kind), so nothing tails container
# stdout, and the main OTel collector's logs pipeline only has an OTLP receiver.
# Result: NO meridian container logs reach Grail — which means the structured
# business-event JSON lines (cart.item_added, checkout.completed, order.*,
# tax.bill_issued, tax.payment_completed, incident.created, …) emitted by the
# services never arrive, so the log-based Business Event funnels cannot populate.
#
# This is a small, self-contained otel-collector-contrib DaemonSet that tails the
# meridian namespace's pod logs off each node's filesystem and ships them to
# Dynatrace via OTLP/HTTP. It is intentionally SEPARATE from the trace/metric
# collector (helm/templates/otel-configmap.yaml) so it cannot affect that
# pipeline. The `container` operator extracts k8s.namespace.name / pod / container
# from the file path, so these logs become scopable by namespace in Grail (the
# OTLP-exported spans carry k8s.cluster.name but logs previously had neither).
#
# NOTE: getting the logs into Grail is necessary but not sufficient for the
# funnels — a Dynatrace log-processing rule (extract event.type + correlation
# keys from the JSON) and the Business Events / Business Flow config still have to
# be applied in the tenant. See docs/dynatrace-config-guide.md.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: meridian-log-collector-config
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-collector
data:
  relay.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      # Tail the meridian namespace's container logs from the node filesystem.
      # The `container` operator auto-detects the CRI/containerd format and adds
      # k8s.namespace.name / k8s.pod.name / k8s.container.name from the file path.
      filelog:
        include:
          - /var/log/pods/{{ include "meridian.namespace" . }}_*/*/*.log
        exclude:
          # Never tail our own logs — would create an ingest feedback loop.
          - /var/log/pods/{{ include "meridian.namespace" . }}_meridian-log-collector-*/*/*.log
        start_at: end
        include_file_path: true
        operators:
          - type: container
            add_metadata_from_filepath: true

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50

      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # Match the resource attributes the trace/metric collector applies, so logs
      # land scoped to the same cluster/environment as the spans.
      resource:
        attributes:
          - key: deployment.environment
            value: "{{ .Values.dynatrace.deploymentEnvironment }}"
            action: upsert
          - key: k8s.cluster.name
            value: "{{ .Values.dynatrace.clusterName }}"
            action: upsert

    exporters:
      # otlphttp is the canonical collector exporter type; it appends /v1/logs to
      # the Dynatrace OTLP base endpoint for the logs pipeline.
      otlphttp/dynatrace:
        endpoint: "{{ .Values.dynatrace.otlpEndpoint }}"
        headers:
          Authorization: "Api-Token {{ .Values.dynatrace.apiToken }}"
        compression: gzip
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/dynatrace]
      telemetry:
        logs:
          level: "info"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: meridian-log-collector
  namespace: {{ include "meridian.namespace" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-collector
spec:
  selector:
    matchLabels:
      app: meridian-log-collector
  template:
    metadata:
      labels:
        app: meridian-log-collector
        {{- include "meridian.labels" . | nindent 8 }}
        app.kubernetes.io/component: log-collector
      annotations:
        # This collector exports logs to Dynatrace itself — no OneAgent injection.
        dynatrace.com/inject: "false"
        # Roll the DaemonSet when the inputs that drive its config change.
        checksum/config: {{ printf "%s|%s|%s|%s" .Values.dynatrace.otlpEndpoint .Values.dynatrace.clusterName .Values.dynatrace.deploymentEnvironment (.Values.logCollector | toYaml) | sha256sum }}
    spec:
      # Run on every node, tolerating any taint (e.g. kind's control-plane node).
      tolerations:
        - operator: Exists
      # Reading root-owned files under /var/log/pods requires root.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: log-collector
          image: {{ .Values.logCollector.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["--config=/conf/relay.yaml"]
          ports:
            - name: health
              containerPort: 13133
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.logCollector.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: meridian-log-collector-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
{{- end }}
