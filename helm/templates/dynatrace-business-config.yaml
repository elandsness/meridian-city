{{- /*
Auto-provisions (and, on uninstall, deprovisions) the Dynatrace business-observability
configuration for THIS instance:
  - an OpenPipeline custom logs pipeline (customId meridian-<hash>-business-events) that
    extracts the BusinessEvents JSON log lines as bizevents (per-instance provider), and
    a routing entry for it keyed on this instance's k8s namespace
  - five Business Flows titled "[Meridian <hash>] ..."
Runs as a post-install/post-upgrade hook Job (DT_ACTION=provision). A separate pre-delete
hook Job (DT_ACTION=delete) removes ONLY this instance's objects on `helm uninstall`, so
concurrent instances on the shared tenant are never affected. The provisioner is idempotent
and matches objects by a stable per-instance key. Renders only when enabled AND a platform
token + apps base URL are available.
*/}}
{{- $bc := .Values.dynatrace.businessConfig }}
{{- $appsUrl := $bc.appsBaseUrl }}
{{- if and (not $appsUrl) .Values.dynatrace.environmentId }}
{{- $appsUrl = printf "https://%s.apps.dynatrace.com" .Values.dynatrace.environmentId }}
{{- end }}
{{- if and $bc.enabled $bc.platformToken $appsUrl }}
{{- $ns := include "meridian.namespace" . }}
{{- $provider := include "meridian.dynatrace.eventProvider" . }}
{{- $hash := include "meridian.instanceHash" . }}
{{- $provName := printf "%s-dt-business-config" (include "meridian.fullname" .) }}
{{- $deprovName := printf "%s-dt-deprovision" (include "meridian.fullname" .) }}
{{- $image := $bc.image | default "python:3.12-slim" }}
# =========================================================================== #
# PROVISION — post-install / post-upgrade
# =========================================================================== #
apiVersion: v1
kind: Secret
metadata:
  name: {{ $provName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
type: Opaque
stringData:
  platform-token: {{ $bc.platformToken | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $provName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  provision.py: |
{{ .Files.Get "files/provision-dynatrace-business-config.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $provName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    # Only talks to the Dynatrace API; no in-cluster operator dependency.
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "meridian.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: provision
          image: {{ $image | quote }}
          command: ["python3", "/scripts/provision.py"]
          env:
            - name: DT_ACTION
              value: "provision"
            - name: DT_APPS_URL
              value: {{ $appsUrl | quote }}
            - name: DT_PLATFORM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $provName }}
                  key: platform-token
            - name: DT_EVENT_PROVIDER
              value: {{ $provider | quote }}
            - name: DT_LOG_NAMESPACE
              value: {{ $ns | quote }}
            - name: DT_INSTANCE_HASH
              value: {{ $hash | quote }}
            - name: DT_SERVICE_NAMES
              value: {{ .Values.industry.dynatrace.serviceNames | default dict | toJson | quote }}
            - name: DT_FLOW_LABELS
              value: {{ .Values.industry.dynatrace.flowLabels | default dict | toJson | quote }}
            - name: DT_FLOWS
              value: {{ .Values.industry.dynatrace.flows | default list | toJson | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: {{ $provName }}
---
# =========================================================================== #
# DEPROVISION — pre-delete (runs on `helm uninstall`)
# Removes ONLY this instance's pipeline, routing entry, and flows. Best-effort:
# the container exits 0 even on failure so a tenant-API hiccup can never wedge
# `helm uninstall` (any orphans can be cleaned by re-running provision.py with
# DT_ACTION=delete). Its own Secret/ConfigMap are rendered fresh at uninstall
# time because the provision set's hooks are deleted after they succeed.
# =========================================================================== #
apiVersion: v1
kind: Secret
metadata:
  name: {{ $deprovName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
type: Opaque
stringData:
  platform-token: {{ $bc.platformToken | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $deprovName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
data:
  provision.py: |
{{ .Files.Get "files/provision-dynatrace-business-config.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $deprovName }}
  namespace: {{ $ns }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  ttlSecondsAfterFinished: 120
  # Generous like the provision Job's backoffLimit: GKE Autopilot can need to
  # schedule a fresh node and cold-pull the image on teardown (nodes are often
  # already scaling down by the time `helm uninstall` runs), and the previous
  # backoffLimit: 1 / activeDeadlineSeconds: 180 could kill the pod via
  # DeadlineExceeded before it ever ran the script — silently skipping the
  # tenant-API delete calls (the `|| echo` fallback only catches script/API
  # errors, not the pod being killed out from under it) and leaving this
  # instance's pipeline/routing entry/Business Flows stale in Dynatrace.
  # Kept just under teardown.sh's `helm uninstall --timeout 5m` so the Job gets
  # the full outer budget instead of truncating it early.
  backoffLimit: 3
  activeDeadlineSeconds: 270
  template:
    metadata:
      labels:
        {{- include "meridian.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: deprovision
          image: {{ $image | quote }}
          # Best-effort: never fail the uninstall on a tenant-API error.
          command: ["sh", "-c", "python3 /scripts/provision.py || echo '[deprovision] non-fatal failure; orphans may remain'"]
          env:
            - name: DT_ACTION
              value: "delete"
            - name: DT_APPS_URL
              value: {{ $appsUrl | quote }}
            - name: DT_PLATFORM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $deprovName }}
                  key: platform-token
            - name: DT_EVENT_PROVIDER
              value: {{ $provider | quote }}
            - name: DT_LOG_NAMESPACE
              value: {{ $ns | quote }}
            - name: DT_INSTANCE_HASH
              value: {{ $hash | quote }}
            - name: DT_SERVICE_NAMES
              value: {{ .Values.industry.dynatrace.serviceNames | default dict | toJson | quote }}
            - name: DT_FLOW_LABELS
              value: {{ .Values.industry.dynatrace.flowLabels | default dict | toJson | quote }}
            - name: DT_FLOWS
              value: {{ .Values.industry.dynatrace.flows | default list | toJson | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: {{ $deprovName }}
{{- end }}
