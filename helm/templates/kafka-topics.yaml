{{- if .Values.kafka.enabled }}
{{- range .Values.kafka.topics }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: {{ .name | replace "." "-" }}
  namespace: {{ include "meridian.namespace" $ }}
  labels:
    strimzi.io/cluster: {{ include "meridian.kafkaCluster" $ }}
    {{- include "meridian.labels" $ | nindent 4 }}
spec:
  partitions: {{ .partitions }}
  replicas: {{ .replicationFactor }}
  config:
    {{- toYaml .config | nindent 4 }}
{{- end }}
{{- end }}
