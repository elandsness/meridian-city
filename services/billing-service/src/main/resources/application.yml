server:
  port: 8091

spring:
  application:
    name: billing-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meridian}
    username: ${SPRING_DATASOURCE_USERNAME:meridian}
    password: ${SPRING_DATASOURCE_PASSWORD:meridian-secret-change-me}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: billing
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: billing
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: billing-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

# Quarterly tax-bill issuance: at the start of each quarter, issue one outstanding
# bill to every citizen who doesn't yet have one for the current period. Idempotent,
# so it's safe to run on any cadence (checked hourly by default).
billing:
  quarterly:
    enabled: ${BILLING_QUARTERLY_ENABLED:true}
    interval-ms: ${BILLING_QUARTERLY_INTERVAL_MS:3600000}
    initial-delay-ms: ${BILLING_QUARTERLY_INITIAL_DELAY_MS:60000}
    min-amount-cents: ${BILLING_QUARTERLY_MIN_AMOUNT_CENTS:15000}
    max-amount-cents: ${BILLING_QUARTERLY_MAX_AMOUNT_CENTS:45000}
    due-days: ${BILLING_QUARTERLY_DUE_DAYS:45}
