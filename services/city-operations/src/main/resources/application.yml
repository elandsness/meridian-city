server:
  port: 8083

spring:
  application:
    name: city-operations
  jackson:
    # snake_case at the HTTP boundary to match the rest of the platform (API_CONVENTIONS §1).
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meridian}
    username: ${SPRING_DATASOURCE_USERNAME:meridian}
    password: ${SPRING_DATASOURCE_PASSWORD:meridian-secret-change-me}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: city
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: city,incidents
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: city-operations-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

# Server-side simulation of the IoT Incident business flow (anomaly_detected ->
# incident.created -> workorder.created -> assigned -> acknowledged -> resolved). The anomaly
# is detected synchronously; the incident.created/workorder.created emissions and the
# work-order lifecycle are each spaced by a uniform random delay in their [min, max] band
# (default ~5 min – 2 hr) so the bizevent steps look realistic instead of firing within
# milliseconds. completion-probability < 1 leaves some work orders unresolved. Shrink the
# bands (e.g. *_MIN_SECONDS=30, *_MAX_SECONDS=120) for a live demo — but keep the total
# comfortably above ~1 min so IoT incidents stay open long enough to be visible on the ops
# Incidents page and overlap the live device anomaly on the Fleet page (the old ~65s total
# resolved them before anyone refreshed; see fix in commit 33e4965).
workorder-lifecycle:
  enabled: ${WORKORDER_LIFECYCLE_ENABLED:true}
  completion-probability: ${WORKORDER_LIFECYCLE_COMPLETION_PROBABILITY:0.85}
  incident-created-min-seconds: ${WORKORDER_LIFECYCLE_INCIDENT_CREATED_MIN_SECONDS:300}
  incident-created-max-seconds: ${WORKORDER_LIFECYCLE_INCIDENT_CREATED_MAX_SECONDS:7200}
  workorder-created-min-seconds: ${WORKORDER_LIFECYCLE_WORKORDER_CREATED_MIN_SECONDS:300}
  workorder-created-max-seconds: ${WORKORDER_LIFECYCLE_WORKORDER_CREATED_MAX_SECONDS:7200}
  assigned-min-seconds: ${WORKORDER_LIFECYCLE_ASSIGNED_MIN_SECONDS:300}
  assigned-max-seconds: ${WORKORDER_LIFECYCLE_ASSIGNED_MAX_SECONDS:7200}
  acknowledged-min-seconds: ${WORKORDER_LIFECYCLE_ACKNOWLEDGED_MIN_SECONDS:300}
  acknowledged-max-seconds: ${WORKORDER_LIFECYCLE_ACKNOWLEDGED_MAX_SECONDS:7200}
  resolved-min-seconds: ${WORKORDER_LIFECYCLE_RESOLVED_MIN_SECONDS:300}
  resolved-max-seconds: ${WORKORDER_LIFECYCLE_RESOLVED_MAX_SECONDS:7200}
