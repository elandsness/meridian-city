server:
  port: 8083

spring:
  application:
    name: city-operations
  jackson:
    # snake_case at the HTTP boundary to match the rest of the platform (API_CONVENTIONS §1).
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meridian}
    username: ${SPRING_DATASOURCE_USERNAME:meridian}
    password: ${SPRING_DATASOURCE_PASSWORD:meridian-secret-change-me}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: city
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: city,incidents
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: city-operations-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

# Server-side simulation of the work-order lifecycle (created -> assigned ->
# acknowledged -> resolved) so the iot-incident funnel fills in and incidents get
# resolved. completion-probability < 1 leaves some work orders unresolved for investigation.
workorder-lifecycle:
  enabled: ${WORKORDER_LIFECYCLE_ENABLED:true}
  # Timings are deliberately on the order of minutes so IoT incidents stay open
  # long enough to be visible on the ops Incidents page and to overlap with the
  # live device anomaly on the IoT Fleet page. With the old ~65s total, real
  # incidents resolved before anyone refreshed and the views looked static.
  # (~6 min total: 60 + 120 + 180.)
  assigned-after-seconds: ${WORKORDER_LIFECYCLE_ASSIGNED_AFTER_SECONDS:60}
  acknowledged-after-seconds: ${WORKORDER_LIFECYCLE_ACKNOWLEDGED_AFTER_SECONDS:120}
  resolved-after-seconds: ${WORKORDER_LIFECYCLE_RESOLVED_AFTER_SECONDS:180}
  completion-probability: ${WORKORDER_LIFECYCLE_COMPLETION_PROBABILITY:0.85}
