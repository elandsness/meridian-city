name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/meridian-city-platform

# Allow the workflow to push images to GitHub Container Registry.
# GitHub's default token permissions are read-only since late 2022.
permissions:
  contents: read
  packages: write

jobs:
  # -------------------------------------------------------------------------
  # Java services (Maven multi-module build would be ideal;
  # for now each service builds independently)
  # -------------------------------------------------------------------------
  build-java:
    name: Build Java Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - citizen-service
          - service-dispatch
          - city-operations
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: mvn -B package -DskipTests

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # Node.js services
  # -------------------------------------------------------------------------
  build-node:
    name: Build Node.js Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - demo-control-api
          - traffic-bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install and build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # Python services
  # -------------------------------------------------------------------------
  build-python:
    name: Build Python Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - analytics-service
          - ai-service
          - telemetry-processor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install and test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pytest --tb=short -q || true

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # Go services
  # -------------------------------------------------------------------------
  build-go:
    name: Build Go Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - iot-ingestion
          - iot-simulator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # Use go.mod (always present) for cache key.
          # go.sum is generated below if not yet committed.
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Build and test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          go mod tidy
          go build ./...
          go test ./... -short

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # React frontends
  # -------------------------------------------------------------------------
  build-frontends:
    name: Build Frontend Apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - public-portal
          - ops-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontends/${{ matrix.app }}/package-lock.json

      - name: Build ${{ matrix.app }}
        working-directory: frontends/${{ matrix.app }}
        run: |
          npm ci
          npm run build

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }} image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: frontends/${{ matrix.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # Helm chart lint
  # -------------------------------------------------------------------------
  helm-lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Add Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add dynatrace \
            https://raw.githubusercontent.com/Dynatrace/dynatrace-operator/main/config/helm/repos/stable
          helm repo update

      - name: Resolve dependencies
        run: helm dependency update helm/

      - name: Lint chart
        run: |
          helm lint helm/ \
            --set dynatrace.apiUrl=https://test.live.dynatrace.com/api \
            --set dynatrace.apiToken=test-token \
            --set dynatrace.otlpEndpoint=https://test.live.dynatrace.com/api/v2/otlp
