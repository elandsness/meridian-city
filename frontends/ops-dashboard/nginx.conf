server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # API proxy
    # The dashboard calls the backend with relative /api/... paths
    # (axios baseURL is empty), including the SSE notification stream at
    # /api/v1/notifications/stream. nginx forwards them to the API gateway
    # inside the cluster. proxy_buffering off + long read timeout keep the
    # SSE stream flowing.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for Server-Sent Events to stream rather than buffer
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # SPA fallback — everything else serves the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
